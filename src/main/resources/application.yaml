spring:
  application:
    name: book-service
  graphql:
    graphiql:
      enabled: true
  datasource:
    url: jdbc:postgresql://localhost:5433/book_db
    username: postgres
    password: password
  jpa:
    open-in-view: false #LazyInitializationException
    properties:
      hibernate:
        format_sql: true
        show_sql: true
    hibernate:
      ddl-auto: update
jwt:
  secret-key: Y2xhdWRlLWNvZGUtYm9vay1zZXJ2aWNlLXNlY3JldC1rZXktZm9yLWp3dC10b2tlbi1nZW5lcmF0aW9u
  access-token-expiration: 15 # in minutes
  refresh-token-expiration: 1440 # in minutes (24 hours)

logging:
  level:
    root: INFO
    az.company.bookservice_2_5: DEBUG
    org.springframework.aop: DEBUG
    net.javacrumbs.shedlock: DEBUG

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html

grpc:
  server:
    port: 9090

logstash:
  host: localhost
  port: 5044
