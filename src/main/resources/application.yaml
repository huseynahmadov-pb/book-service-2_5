spring:
  application:
    name: book-service
  datasource:
    url: jdbc:postgresql://localhost:5433/book_db
    username: postgres
    password: password
  jpa:
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
        show_sql: true
    hibernate:
      ddl-auto: update

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
