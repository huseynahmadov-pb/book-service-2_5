apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: book-service-ingress
  namespace: book-service
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
spec:
  ingressClassName: nginx
  rules:
    - host: book-service.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: book-service
                port:
                  number: 8080
